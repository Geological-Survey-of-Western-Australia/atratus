trigger:
  batch: true
  branches:
    include:
    - '*'

variables:
  - group: gswa-pypi
  - group: gswa-jfrog
  # for releases
  - name: isMain
    value: $[eq(variables['Build.SourceBranch'], 'refs/heads/main')]
  # for integration testing
  - name: isRC
    value: $[contains(variables['Build.SourceBranch'], 'releases/')]
  # for modifying/reviewing pipeline
  - name: isCICD 
    value: $[contains(variables['Build.SourceBranch'], 'cicd')]

pool:
  vmImage: ubuntu-latest

stages:
- stage: Test
  displayName: 'Unit Tests'
  condition: always()
  jobs:
    - job: TestCoverage
      displayName: 'Test coverage'
      steps:
        - task: UsePythonVersion@0
          inputs:
            versionSpec: '3.12'
            addToPath: true
            architecture: 'x64'

        - script: |
            python -m pip install .[tests] pytest-azurepipelines
            python -m pytest --cov-report xml:tests/cov.xml --cov tests/
          displayName: 'Test .[tests]'
        
        - task: PublishCodeCoverageResults@2
          inputs:
            summaryFileLocation: '**/tests/cov.xml'
            pathToSources: '$(System.DefaultWorkingDirectory)/src/'
            failIfCoverageEmpty: true

- stage: Xray
  displayName: 'Xray Scan'
  trigger: manual
  isSkippable: false
  jobs:
    - job: BuildDependencies
      displayName: 'Install, build, and scan'
      steps:
        - task: UsePythonVersion@0
          inputs:
            versionSpec: '3.12'
            addToPath: true
            architecture: 'x64'

        - script: |
            python -m pip install twine
            python -m pip wheel -w dist/ .
          displayName: 'Python build'
        
        - script: |
              curl -fL https://install-cli.jfrog.io | sh
              jf config add jfrog-bot \
              --url="$(JFROG_URL)" \
              --access-token="$JFROG_ACCESS_TOKEN" \
              --interactive=false
          env:
            JFROG_URL: $(jfrog_url)
            JFROG_ACCESS_TOKEN: $(jfrog-bot-token)
          displayName: Install and configure JFrog CLI

        - script: |
            jf scan dist/ --format='json' > xray.json
            jf scan dist/ --format='sarif' > xray.sarif
          displayName: 'Xray Scan'

        - task: PublishPipelineArtifact@1
          inputs:
            targetPath: xray.sarif
            artifactName: CodeAnalysisLogs
          env:
            BUILD_NAME: $(Build.DefinitionName)
            BUILD_NUMBER: $(Build.BuildNumber)
          displayName: 'Publish SARIF artifact'

        - script: |
            python - <<'EOF'
            import json
            import sys
            sarif_file = "xray.json"
            with open(sarif_file, "r", encoding="utf-8") as f:
                data = json.load(f)

            scanned_components = [
                item["component_id"]
                for item in data
                if "components"
                if "component_id" in item.keys()
            ]
            
         
            if "vulnerabilities" not in data[-1].keys():
              print("No vulnerabilities detected")
              sys.exit(0)
            elif  "vulnerabilities" in data[-1].keys(): 
              num_vulnerabilities = len(data[-1]["vulnerabilities"])
              if num_vulnerabilities > 0:
                  print(f"{num_vulnerabilities} High or Critical vulnerabilities detected")
                  sys.exit(1)


          displayName: 'Parse Vulnerabilities in xray Report'

- stage: Build
  displayName: 'Build and Publish'
  dependsOn: 
    - Test
    # - SecurityCheck
  condition: and( succeeded('Test'), or(eq(variables.isMain, true), eq(variables.isRC, true)) )
  jobs:
    - job: BuildDependencies
      displayName: 'Install and build'
      steps:
        - task: UsePythonVersion@0
          inputs:
            versionSpec: '3.12'
            addToPath: true
            architecture: 'x64'
        
        - script: |
            python -m pip install twine
            python -m pip wheel --no-deps -w dist/ .
          displayName: 'Python build'

        - task: TwineAuthenticate@1
          inputs:
            artifactFeed: GSRSD/gdi_packages
          displayName: 'Twine authenticate'

        - script: |
            jf xr scan dist/ --format=sarif > xray.json
          displayName: Scan package + dependencies

        - task: PublishPipelineArtifact@1
          inputs:
            targetPath: xray.json
            artifactName: Sarif File
          displayName: Publish Pipeline Artifact - SARIF

        - task: PublishBuildArtifacts@1
          inputs:
            targetPath: $(System.DefaultWorkingDirectory)/xray.json
            artifactName: CodeAnalysisLogs
          displayName: Publish Build Artifact - SARIF

        - script: |
            python -m twine upload -r gdi_packages --config-file $(PYPIRC_PATH) dist/*.whl
          displayName: 'Upload to feed'

